<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>給与・手取り 計算ナビ</title>
  
  <!-- Tailwind CSS (JIT CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (Production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone (ブラウザ上でJSXをコンパイルするためのもの) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase SDK Compat (ES Modulesを使わずに動く互換ライブラリ) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* アニメーション用の簡単なユーティリティクラス */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Reactのマウントポイント -->
  <div id="root"></div>

  <!-- Reactコード (Babelでトランスパイル) -->
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // ==========================================
    // Firebase 初期化 (互換モード)
    // ==========================================
    let db = null;
    let auth = null;
    let appId = 'default-app-id';

    try {
      // 開発環境（Canvas内など）で定義されている場合にのみFirebaseを初期化
      if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
        appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
      }
    } catch (e) {
      console.warn("Firebase initialization skipped or failed. Falling back to LocalStorage.", e);
    }


    // ==========================================
    // 共通ヘルパー・UIコンポーネント
    // ==========================================

    const formatNum = (numStr) => {
      if (!numStr) return '';
      return Number(numStr).toLocaleString();
    };

    const timeStrToHours = (timeStr) => {
      if (!timeStr) return 0;
      const parts = timeStr.split(':');
      const h = parseInt(parts[0], 10) || 0;
      const m = parseInt(parts[1], 10) || 0;
      return h + (m / 60);
    };

    const calculateNewInputValue = (currentVal, val, type) => {
      if (val === 'C') return '';
      if (val === 'BS') return currentVal.slice(0, -1);

      if (type === 'time') {
        if (val === ':') {
          if (currentVal.includes(':')) return currentVal; 
          if (currentVal === '') return '0:'; 
          return currentVal + ':';
        }
        if (currentVal.includes(':')) {
          const parts = currentVal.split(':');
          if (parts[1].length >= 2) return currentVal; 
          const newMin = parts[1] + val;
          if (parseInt(newMin, 10) >= 60) return currentVal; 
          return currentVal + val;
        } else {
          return currentVal + val;
        }
      } else {
        if (currentVal === '' && (val === '0' || val === '00' || val === '000')) return currentVal;
        if (currentVal.length + val.length > 9) return currentVal;
        return currentVal + val;
      }
    };

    const InputField = ({ id, label, placeholder, suffix, value, activeInput, onClick, isSubLabel, disabled }) => (
      <div 
        className={`relative p-3 border-2 rounded-xl transition-all ${
          disabled 
            ? 'border-gray-100 bg-gray-50/50 cursor-not-allowed opacity-50' 
            : activeInput === id 
              ? 'border-blue-500 bg-blue-50/50 shadow-inner cursor-pointer' 
              : 'border-gray-200 bg-white hover:border-blue-300 cursor-pointer'
        }`}
        onClick={() => !disabled && onClick(id)}
      >
        <label className="block text-xs font-semibold text-gray-500 mb-1">
          {label}
          {isSubLabel && <span className="block text-[10px] font-normal text-gray-400 mt-0.5">{isSubLabel}</span>}
        </label>
        <div className="flex items-baseline justify-between">
          <div className={`text-xl font-bold ${value ? 'text-gray-800' : 'text-gray-300'}`}>
            {value ? (value.includes(':') ? value : formatNum(value)) : placeholder}
          </div>
          {suffix && <span className="text-sm font-medium text-gray-500 ml-2">{suffix}</span>}
        </div>
        {activeInput === id && !disabled && (
          <div className="absolute right-3 top-1/2 -translate-y-1/2 w-2 h-2 rounded-full bg-blue-500 animate-pulse" />
        )}
      </div>
    );

    const Keypad = ({ activeInput, activeLabel, inputType, onKeyPress, onClose }) => {
      return (
        <div 
          className={`fixed bottom-0 left-0 right-0 bg-gray-100 border-t border-gray-300 shadow-[0_-10px_20px_rgba(0,0,0,0.1)] transition-transform duration-300 ease-in-out z-50 ${activeInput ? 'translate-y-0' : 'translate-y-full'}`}
        >
          <div className="max-w-md mx-auto bg-gray-100 pb-safe">
            <div className="flex justify-between items-center p-3 bg-white border-b">
              <span className="text-sm font-bold text-gray-600 truncate mr-4">
                {activeLabel} を入力中...
              </span>
              <button 
                onClick={onClose}
                className="px-4 py-1.5 bg-blue-600 text-white text-sm font-bold rounded-lg shadow-sm active:bg-blue-700 shrink-0"
              >
                完了
              </button>
            </div>
            
            <div className="grid grid-cols-3 gap-1 p-2">
              {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                <button 
                  key={num} 
                  onClick={() => onKeyPress(num.toString())}
                  className="bg-white py-4 text-2xl font-medium text-gray-800 rounded shadow-sm active:bg-gray-200"
                >
                  {num}
                </button>
              ))}
              
              <button 
                onClick={() => onKeyPress(inputType === 'time' ? ':' : '00')}
                className={`bg-white py-4 text-xl font-medium ${inputType === 'time' ? 'text-blue-600 font-bold' : 'text-gray-800'} rounded shadow-sm active:bg-gray-200`}
              >
                {inputType === 'time' ? ':' : '00'}
              </button>
              
              <button 
                onClick={() => onKeyPress('0')}
                className="bg-white py-4 text-2xl font-medium text-gray-800 rounded shadow-sm active:bg-gray-200"
              >
                0
              </button>
              
              <div className="grid grid-cols-2 gap-1">
                <button 
                  onClick={() => onKeyPress('C')}
                  className="bg-red-50 text-red-600 font-bold rounded shadow-sm active:bg-red-100"
                >
                  C
                </button>
                <button 
                  onClick={() => onKeyPress('BS')}
                  className="bg-gray-200 text-gray-700 flex justify-center items-center rounded shadow-sm active:bg-gray-300"
                >
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z" /></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };


    // ==========================================
    // コンポーネント 1: 時給・残業代 計算シミュレーター
    // ==========================================
    const HourlyCalculator = ({ inputs, setInputs }) => {
      const [activeInput, setActiveInput] = useState(null);
      const containerRef = useRef(null);

      const inputConfig = {
        hourlyWage: { label: '時給', type: 'number', suffix: '円', placeholder: '1,200' },
        scheduledTime: { label: '所定内勤務時間', subLabel: '通常のシフトで働いた時間', type: 'time', suffix: '時間', placeholder: '120:00' },
        statutoryTime: { label: '法定内残業時間', subLabel: 'シフト超え〜1日8時間以内', type: 'time', suffix: '時間', placeholder: '5:00' },
        overtimeTime: { label: '法定外残業時間', subLabel: '1日8時間・週40時間超え', type: 'time', suffix: '時間', placeholder: '10:00' },
        nightTime: { label: '深夜労働時間', subLabel: '22時〜翌5時 (重複入力)', type: 'time', suffix: '時間', placeholder: '3:00' },
        overtimeRate: { label: '法定外割増率', type: 'number', suffix: '%', placeholder: '25' },
        nightRate: { label: '深夜割増率', type: 'number', suffix: '%', placeholder: '25' }
      };

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (containerRef.current && !containerRef.current.contains(event.target)) setActiveInput(null);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleKeypadClick = (val) => {
        if (!activeInput) return;
        const type = inputConfig[activeInput].type;
        setInputs(prev => ({
          ...prev,
          [activeInput]: calculateNewInputValue(prev[activeInput] || '', val, type)
        }));
      };

      const results = useMemo(() => {
        const wage = Number(inputs.hourlyWage) || 0;
        const oRate = Number(inputs.overtimeRate) || 0;
        const nRate = Number(inputs.nightRate) || 0;

        const schedHours = timeStrToHours(inputs.scheduledTime);
        const statHours = timeStrToHours(inputs.statutoryTime);
        const overHours = timeStrToHours(inputs.overtimeTime);
        const nightHours = timeStrToHours(inputs.nightTime);

        const base = wage * schedHours;
        const statutory = wage * statHours;
        const overtimeMultiplier = 1 + (oRate / 100);
        const overtime = wage * overtimeMultiplier * overHours;
        const nightMultiplier = nRate / 100;
        const night = wage * nightMultiplier * nightHours;
        const total = base + statutory + overtime + night;

        return {
          basePay: Math.round(base),
          statutoryPay: Math.round(statutory),
          overtimePay: Math.round(overtime),
          nightPay: Math.round(night),
          totalPay: Math.round(total),
        };
      }, [inputs]);

      return (
        <div className="pb-80 animate-fade-in" ref={containerRef}>
          <div className="max-w-md mx-auto px-4 mt-6 space-y-6">
            <div className="text-center mb-4">
              <p className="text-xs text-slate-500 font-medium bg-slate-200 inline-block px-3 py-1 rounded-full shadow-sm">
                シフト時間から額面給与をシミュレーション
              </p>
            </div>

            <section className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
              <h2 className="text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                <span className="bg-blue-100 text-blue-600 p-1.5 rounded shadow-sm">✏️</span> 基本情報・勤務時間
              </h2>
              <div className="grid grid-cols-2 gap-3">
                <div className="col-span-2">
                  <InputField id="hourlyWage" value={inputs.hourlyWage} activeInput={activeInput} onClick={setActiveInput} {...inputConfig.hourlyWage} />
                </div>
                <div className="col-span-2">
                  <InputField id="scheduledTime" value={inputs.scheduledTime} activeInput={activeInput} onClick={setActiveInput} {...inputConfig.scheduledTime} isSubLabel={inputConfig.scheduledTime.subLabel} />
                </div>
                <div className="col-span-2">
                  <InputField id="statutoryTime" value={inputs.statutoryTime} activeInput={activeInput} onClick={setActiveInput} {...inputConfig.statutoryTime} isSubLabel={inputConfig.statutoryTime.subLabel} />
                </div>
                <div className="col-span-2">
                  <InputField id="overtimeTime"

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【提案】埼玉大学管弦楽団 新・後援組織の設立</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
    body { font-family: 'Noto Sans JP', 'Inter', sans-serif; }
    .nav-blur { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
    .section-animate { animation: fadeInUp 0.6s ease-out forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-[#fafafa] text-slate-900 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const Icon = ({ path, color = "currentColor" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: path }} />
    );

    const icons = {
      alert: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
      users: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
      heart: '<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>',
      shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
      code: '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',
      pie: '<path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>',
      vote: '<path d="m9 12 2 2 4-4"/><path d="M5 18v-6a5 5 0 0 1 5-5h4a5 5 0 0 1 5 5v6"/><path d="M19 20a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V8.5A2.5 2.5 0 0 1 7.5 6h9A2.5 2.5 0 0 1 19 8.5z"/>'
    };

    const App = () => {
      const [view, setView] = useState('main'); // 'main' or 'app'

      const Header = () => (
        <nav className="fixed top-0 w-full z-50 border-b border-slate-200 nav-blur">
          <div className="max-w-4xl mx-auto px-5 py-4 flex justify-between items-center">
            <div className="flex items-center gap-2">
              <div className="w-7 h-7 bg-emerald-600 rounded flex items-center justify-center text-white font-black text-sm">C</div>
              <span className="font-bold text-slate-800 tracking-tight">CO-next Project</span>
            </div>
            <div className="flex gap-4">
              <button 
                onClick={() => setView('main')}
                className={`text-xs font-bold transition ${view === 'main' ? 'text-emerald-600' : 'text-slate-500 hover:text-emerald-600'}`}
              >
                組織案
              </button>
              <button 
                onClick={() => setView('app')}
                className={`text-xs font-bold transition ${view === 'app' ? 'text-emerald-600' : 'text-slate-500 hover:text-emerald-600'}`}
              >
                システム案
              </button>
            </div>
          </div>
        </nav>
      );

      const MainContent = () => (
        <div className="space-y-20 section-animate">
          {/* Hero */}
          <section className="text-center pt-24 pb-12 px-5">
            <span className="bg-emerald-100 text-emerald-700 text-[10px] font-black px-3 py-1 rounded-full tracking-widest uppercase mb-6 inline-block">
              For Our Orchestra Generations
            </span>
            <h1 className="text-3xl md:text-5xl font-black text-slate-900 leading-[1.2] mb-8">
              伝統の音を、<br /><span className="text-emerald-600 underline decoration-emerald-200 decoration-8 underline-offset-4">次代へ繋ぐインフラ</span>を。
            </h1>
            <p className="max-w-2xl mx-auto text-slate-600 leading-relaxed text-sm md:text-base">
              国立大学の予算削減や物価高により、現役生たちの活動環境はかつてないほど厳しくなっています。
              卒団しても無理なく、透明性を持って彼らを支え続けられる「新しいOBOG会」を一緒に作りませんか？
            </p>
          </section>

          {/* Challenges */}
          <section className="px-5 max-w-5xl mx-auto grid md:grid-cols-2 gap-6">
            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
              <div className="text-red-500 mb-5"><Icon path={icons.alert} /></div>
              <h2 className="text-xl font-bold mb-4">現役生が抱える「構造的危機」</h2>
              <p className="text-sm text-slate-600 leading-relaxed">
                楽器の修理費や消耗品、ホール代の急騰。音楽に没頭すべき後輩たちが、資金繰りのために活動を縮小せざるを得ない現状があります。これまでの「単発の寄付」だけでは解決できない段階に来ています。
              </p>
            </div>
            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
              <div className="text-amber-500 mb-5"><Icon path={icons.users} /></div>
              <h2 className="text-xl font-bold mb-4">私たちが避けたい「重い組織」</h2>
              <p className="text-sm text-slate-600 leading-relaxed">
                従来のOBOG会は「会長・役員」への実務負担が重すぎました。誰もやりたがらない「役職の押し付け合い」を終わらせるため、実務を人に依存しないシステムへの転換を提案します。
              </p>
            </div>
          </section>

          {/* Organizational Proposal */}
          <section className="px-5 max-w-4xl mx-auto space-y-8">
            <h2 className="text-2xl font-black text-center text-slate-900">新・後援組織の運営モデル</h2>
            <div className="space-y-4">
              <div className="flex gap-5 p-6 bg-emerald-50 rounded-3xl border border-emerald-100">
                <div className="shrink-0 w-10 h-10 bg-white rounded-full flex items-center justify-center text-emerald-600 shadow-sm"><Icon path={icons.shield} /></div>
                <div>
                  <h3 className="font-bold mb-1">自律分散型ガバナンス</h3>
                  <p className="text-sm text-slate-600 leading-relaxed">会長や理事を置かず、実務の9割をシステム化します。特定の個人に重責を負わせない「自律運営」を目指します。</p>
                </div>
              </div>
              <div className="flex gap-5 p-6 bg-blue-50 rounded-3xl border border-blue-100">
                <div className="shrink-0 w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-600 shadow-sm"><Icon path={icons.users} /></div>
                <div>
                  <h3 className="font-bold mb-1">アンバサダー制</h3>
                  <p className="text-sm text-slate-600 leading-relaxed">各卒団代から「アンバサダー（連絡係）」を1名選出。役割は同期への周知と、アプリ上での資金執行承認ボタンを押すだけです。</p>
                </div>
              </div>
            </div>
          </section>

          {/* Development Status */}
          <section className="px-5 max-w-3xl mx-auto">
            <div className="bg-slate-900 text-white p-8 rounded-[2rem] shadow-xl relative overflow-hidden">
              <div className="absolute top-0 right-0 p-8 opacity-10"><Icon path={icons.code} /></div>
              <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                <Icon path={icons.code} color="#34d399" />
                私たちが責任を持って開発します
              </h2>
              <p className="text-sm text-slate-300 leading-relaxed mb-6">
                この組織の核となるWebアプリ「CO-next」の開発・運用は、発案有志（私たち）が中心となって進めます。外部業者への委託費用をかけず、自分たちの手で維持可能なコストで構築します。
              </p>
              <button 
                onClick={() => { setView('app'); window.scrollTo(0, 0); }}
                className="w-full bg-emerald-500 hover:bg-emerald-400 text-white py-4 rounded-2xl font-bold transition shadow-lg shadow-emerald-500/20"
              >
                アプリの具体的な仕様を見る
              </button>
            </div>
          </section>

          {/* Closing */}
          <section id="contact" className="text-center py-16 px-5 border-t border-slate-200">
            <h2 className="text-2xl font-black mb-6">まずは議論の輪に入りませんか？</h2>
            <p className="text-sm text-slate-600 mb-10 leading-relaxed">
              これはまだ「ドラフト」です。同世代の仲間たちと一緒に練り上げていきたいと考えています。<br />
              規約作りや運営、技術面で協力してくれる方はもちろん、まずは話を聞いてみたいという方も歓迎です。
            </p>
            <div className="flex flex-col sm:flex-row gap-4 justify-center">
              <a href="#" className="bg-emerald-600 hover:bg-emerald-500 text-white px-10 py-4 rounded-full font-bold shadow-lg transition">LINEで連絡する</a>
              <a href="#" className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-10 py-4 rounded-full font-bold transition">Discordに参加</a>
            </div>
          </section>
        </div>
      );

      const AppContent = () => (
        <div className="pt-24 pb-20 px-5 max-w-3xl mx-auto section-animate space-y-12">
          <div className="space-y-4">
            <h2 className="text-3xl font-black text-slate-900">CO-next アプリ構想</h2>
            <p className="text-slate-600 text-sm leading-relaxed">
              「不透明さ」「役職の負担」「世代間の断絶」をテクノロジーで解決するための、専用プラットフォーム案です。
            </p>
          </div>

          <div className="grid gap-6">
            <div className="bg-white p-6 rounded-3xl border border-slate-200 flex gap-5">
              <div className="shrink-0 w-12 h-12 bg-pink-100 text-pink-600 rounded-2xl flex items-center justify-center"><Icon path={icons.heart} /></div>
              <div>
                <h3 className="font-bold text-lg mb-2 text-slate-800">1. クラファン型支援</h3>
                <p className="text-sm text-slate-600">現役生が起案したプロジェクト（修理・購入等）に対し、スマホからクレジットカードで1口単位（500円〜）の寄付が可能です。誰の何に役立っているのかが直接見えます。</p>
              </div>
            </div>

            <div className="bg-white p-6 rounded-3xl border border-slate-200 flex gap-5">
              <div className="shrink-0 w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center"><Icon path={icons.pie} /></div>
              <div>
                <h3 className="font-bold text-lg mb-2 text-slate-800">2. 透明性ダッシュボード</h3>
                <p className="text-sm text-slate-600">現在のプール金残高や使途内訳をリアルタイムで公開。1円単位で履歴が自動記録されるため、会計報告の手間と不透明さを一掃します。</p>
              </div>
            </div>

            <div className="bg-white p-6 rounded-3xl border border-slate-200 flex gap-5">
              <div className="shrink-0 w-12 h-12 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center"><Icon path={icons.vote} /></div>
              <div>
                <h3 className="font-bold text-lg mb-2 text-slate-800">3. 自律型ガバナンス機能</h3>
                <p className="text-sm text-slate-600">高額な送金要求があった場合、各代のアンバサダーに通知が飛びます。アプリ上で過半数が承認すれば送金が実行される、公平な意思決定をシステムで実現します。</p>
              </div>
            </div>
          </div>

          <div className="bg-slate-100 p-8 rounded-3xl">
            <h3 className="font-bold mb-4 flex items-center gap-2 text-slate-800"><Icon path={icons.shield} /> システムの継続性</h3>
            <p className="text-xs text-slate-600 leading-relaxed mb-4">
              特定の個人がいなくなっても大丈夫なように、モダンな標準技術を採用し、ドキュメントを完備した「引き継ぎやすい設計」で開発します。ITスキルを持つ他のOBOGが、いつでもコミットできる状態を目指します。
            </p>
          </div>

          <button 
            onClick={() => { setView('main'); window.scrollTo(0, 0); }}
            className="text-slate-500 font-bold text-sm underline underline-offset-4 block mx-auto py-8"
          >
            組織設立の提案に戻る
          </button>
        </div>
      );

      return (
        <div className="min-h-screen">
          <Header />
          {view === 'main' ? <MainContent /> : <AppContent />}
          <footer className="bg-white border-t border-slate-200 py-10 px-5 text-center">
            <p className="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-2">CO-next Project Draft</p>
            <p className="text-xs text-slate-500">埼玉大学管弦楽団 後援組織 設立準備委員会 有志一同</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
